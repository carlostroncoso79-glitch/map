<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samy</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #f5f5f5; }
        #map { height: calc(100vh - 180px); width: 100%; margin-top: 50px; }
        .header {
            background: #0088cc; color: white; padding: 15px;
            text-align: center; font-weight: bold;
            position: fixed; top: 0; width: 100%; z-index: 1000;
        }
        .pin-center {
            position: fixed; top: calc(50% - 60px); left: 50%;
            transform: translate(-50%, -50%); font-size: 40px;
            z-index: 500; pointer-events: none;
        }
        .controls {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: white; padding: 15px; z-index: 1000;
        }
        .info-box {
            padding: 10px; background: #f0f8ff;
            border-radius: 8px; margin-bottom: 10px; font-size: 12px;
        }
        .coords {
            font-family: monospace; color: #0088cc;
            text-align: center; margin-bottom: 10px;
        }
        .btn-confirm {
            width: 100%; padding: 15px; background: #28a745;
            color: white; border: none; border-radius: 10px;
            font-size: 16px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">📍 Selecciona tu destino</div>
    <div class="pin-center">📍</div>
    <div id="map"></div>
    
    <div class="controls">
        <div class="info-box" id="address">Cargando...</div>
        <div class="coords" id="coords">--</div>
        <button class="btn-confirm" onclick="enviar()">
            ✅ ENVIAR DESTINO
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        const params = new URLSearchParams(window.location.search);
        const userId = params.get('user_id');
        const chatId = params.get('chat_id');
        const originLat = parseFloat(params.get('origin_lat')) || 11.247425;
        const originLng = parseFloat(params.get('origin_lng')) || -74.205316;

        const map = L.map('map', { zoomControl: false, attributionControl: false })
            .setView([originLat, originLng], 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

        let currentLat = originLat;
        let currentLng = originLng;
        let currentAddress = '';

        async function actualizar() {
            const center = map.getCenter();
            currentLat = center.lat;
            currentLng = center.lng;
            
            document.getElementById('coords').textContent = 
                `${currentLat.toFixed(6)}, ${currentLng.toFixed(6)}`;
            
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${currentLat}&lon=${currentLng}&zoom=18`);
                const data = await res.json();
                currentAddress = data.display_name || 'Ubicación seleccionada';
                document.getElementById('address').textContent = currentAddress.substring(0, 100);
            } catch (e) {
                currentAddress = `${currentLat.toFixed(5)}, ${currentLng.toFixed(5)}`;
                document.getElementById('address').textContent = currentAddress;
            }
        }

        map.on('moveend', actualizar);
        setTimeout(actualizar, 500);

        // Enviar a la Edge Function
        async function enviar() {
            const btn = document.querySelector('.btn-confirm');
            btn.textContent = '⏳ Enviando...';
            btn.disabled = true;

            const datos = {
                client_id: parseInt(userId),
                chat_id: parseInt(chatId),
                dest_lat: currentLat,
                dest_lng: currentLng,
                dest_address: currentAddress
            };

            console.log('Enviando:', datos);

            try {
                const res = await fetch('https://fsdqvdxvhqauyqczgsfb.supabase.co/functions/v1/telegram-bot', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datos)
                });

                const result = await res.json();
                console.log('Respuesta:', result);

                if (result.success) {
                    btn.textContent = '✅ Enviado!';
                    setTimeout(() => tg.close(), 1000);
                } else {
                    throw new Error(result.error || 'Error');
                }
                
            } catch (e) {
                console.error('Error:', e);
                btn.textContent = '❌ Error. Reintentar';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
