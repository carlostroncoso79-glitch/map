<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Samy - Seleccionar Destino</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            overflow: hidden;
        }
        #map { 
            height: calc(100vh - 200px); 
            width: 100%;
            z-index: 1;
            margin-top: 50px;
        }
        .header {
            background: #0088cc;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }
        .pin-center {
            position: fixed;
            top: calc(50% - 60px);
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 45px;
            z-index: 500;
            pointer-events: none;
        }
        .controls {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            padding: 15px;
            box-shadow: 0 -3px 10px rgba(0,0,0,0.15);
            z-index: 1000;
        }
        .info-box {
            padding: 10px;
            background: #f0f8ff;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 12px;
            min-height: 40px;
        }
        .coords {
            font-family: monospace;
            color: #0088cc;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .btn-confirm {
            width: 100%;
            padding: 16px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-confirm:disabled {
            background: #ccc;
        }
        .status {
            text-align: center;
            font-size: 12px;
            margin-top: 5px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="header">📍 Selecciona tu destino</div>
    
    <div class="pin-center">📍</div>
    <div id="map"></div>
    
    <div class="controls">
        <div class="info-box" id="address">Cargando dirección...</div>
        <div class="coords" id="coords">--</div>
        <button class="btn-confirm" id="btnConfirm" onclick="guardarViaje()">
            ✅ SOLICITAR VIAJE
        </button>
        <div class="status" id="status"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        const params = new URLSearchParams(window.location.search);
        const userId = params.get('user_id');
        const chatId = params.get('chat_id') || userId;
        const originLat = parseFloat(params.get('origin_lat'));
        const originLng = parseFloat(params.get('origin_lng'));
        const originAddress = params.get('origin_address') || 'Ubicación origen';

        // URL de tu Edge Function
        const API_URL = 'https://fsdqvdxvhqauyqczgsfb.supabase.co/functions/v1/guardar-viaje';

        const map = L.map('map', { zoomControl: false, attributionControl: false })
            .setView([originLat, originLng], 16);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

        let currentLat = originLat;
        let currentLng = originLng;
        let currentAddress = '';

        async function actualizarInfo() {
            const center = map.getCenter();
            currentLat = center.lat;
            currentLng = center.lng;
            
            document.getElementById('coords').textContent = 
                `${currentLat.toFixed(6)}, ${currentLng.toFixed(6)}`;
            
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${currentLat}&lon=${currentLng}&zoom=18`);
                const data = await res.json();
                currentAddress = data.display_name || 'Ubicación seleccionada';
                document.getElementById('address').textContent = currentAddress.substring(0, 100);
            } catch (e) {
                currentAddress = `${currentLat.toFixed(5)}, ${currentLng.toFixed(5)}`;
                document.getElementById('address').textContent = currentAddress;
            }
        }

        map.on('moveend', actualizarInfo);
        setTimeout(actualizarInfo, 500);

        async function guardarViaje() {
            const btn = document.getElementById('btnConfirm');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            btn.textContent = '⏳ Guardando...';
            status.textContent = 'Creando solicitud de viaje...';

            const datos = {
                client_id: parseInt(userId),
                chat_id: parseInt(chatId),
                origin_lat: originLat,
                origin_lng: originLng,
                origin_address: originAddress,
                dest_lat: currentLat,
                dest_lng: currentLng,
                dest_address: currentAddress
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datos)
                });

                const resultado = await response.json();

                if (resultado.success) {
                    status.textContent = '✅ ¡Viaje solicitado! Revisa el chat.';
                    status.style.color = '#28a745';
                    
                    setTimeout(() => {
                        tg.close();
                    }, 1500);
                    
                } else {
                    throw new Error(resultado.error || 'Error al guardar');
                }
                
            } catch (error) {
                console.error('Error:', error);
                status.textContent = '❌ Error. Intenta de nuevo.';
                status.style.color = '#dc3545';
                btn.disabled = false;
                btn.textContent = '✅ SOLICITAR VIAJE';
            }
        }
    </script>
</body>
</html>
