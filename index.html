<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Samy - Seleccionar Destino</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            overflow: hidden;
        }
        #map { 
            height: calc(100vh - 220px); 
            width: 100%;
            z-index: 1;
            margin-top: 50px;
        }
        .header {
            background: #0088cc;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }
        .pin-center {
            position: fixed;
            top: calc(50% - 60px);
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 45px;
            z-index: 500;
            pointer-events: none;
        }
        .controls {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            padding: 15px;
            box-shadow: 0 -3px 10px rgba(0,0,0,0.15);
            z-index: 1000;
        }
        .info-box {
            padding: 10px;
            background: #f0f8ff;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 12px;
        }
        .coords {
            font-family: monospace;
            color: #0088cc;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
        }
        .btn-primary {
            width: 100%;
            padding: 16px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
        }
        .btn-secondary {
            width: 100%;
            padding: 12px;
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">📍 Selecciona tu destino</div>
    
    <div class="pin-center">📍</div>
    <div id="map"></div>
    
    <div class="controls">
        <div class="info-box" id="address">Cargando...</div>
        <div class="coords" id="coords">--</div>
        <button class="btn-primary" onclick="enviarDestino()">
            ✅ ENVIAR DESTINO AL BOT
        </button>
        <button class="btn-secondary" onclick="copiarComando()">
            📋 Copiar comando manual
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        const params = new URLSearchParams(window.location.search);
        const userId = params.get('user_id');
        const originLat = parseFloat(params.get('origin_lat')) || 11.247425;
        const originLng = parseFloat(params.get('origin_lng')) || -74.205316;

        const map = L.map('map', { zoomControl: false, attributionControl: false })
            .setView([originLat, originLng], 16);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

        let currentLat = originLat;
        let currentLng = originLng;
        let currentAddress = '';

        async function actualizarInfo() {
            const center = map.getCenter();
            currentLat = center.lat;
            currentLng = center.lng;
            
            document.getElementById('coords').textContent = 
                `${currentLat.toFixed(6)}, ${currentLng.toFixed(6)}`;
            
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${currentLat}&lon=${currentLng}&zoom=18`);
                const data = await res.json();
                currentAddress = data.display_name || 'Ubicación seleccionada';
                document.getElementById('address').textContent = currentAddress.substring(0, 80) + '...';
            } catch (e) {
                currentAddress = `${currentLat.toFixed(5)}, ${currentLng.toFixed(5)}`;
                document.getElementById('address').textContent = currentAddress;
            }
        }

        map.on('moveend', actualizarInfo);
        setTimeout(actualizarInfo, 500);

        // MÉTODO 1: Intentar tg.sendData()
        function enviarDestino() {
            const datos = {
                user_id: userId,
                lat: currentLat,
                lng: currentLng,
                address: currentAddress
            };

            console.log('Enviando:', datos);

            try {
                tg.sendData(JSON.stringify(datos));
                console.log('sendData ejecutado');
                
                setTimeout(() => {
                    tg.close();
                }, 500);
                
            } catch (e) {
                console.error('Error sendData:', e);
                alert('Error al enviar. Usa el botón "Copiar comando manual"');
            }
        }

        // MÉTODO 2: Copiar comando como respaldo
        function copiarComando() {
            const comando = `/destino ${currentLat.toFixed(6)} ${currentLng.toFixed(6)} ${userId}`;
            
            // Copiar al portapapeles
            navigator.clipboard.writeText(comando).then(() => {
                alert('📋 Comando copiado!\n\nPega este mensaje en el chat del bot:\n\n' + comando);
                tg.close();
            }).catch(() => {
                // Si no se puede copiar, mostrar para copiar manual
                prompt('Copia este comando y envíalo en el chat:', comando);
            });
        }
    </script>
</body>
</html>
